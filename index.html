<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com"
    />
    <link rel="stylesheet" href="style.css">
    <title data-i18n="app.title">JSON ER</title>
  </head>
  <body>
    <div id="app">
      <div class="tabs">
        <button class="tab active" data-tab="editor" data-i18n="editor.tab">Editor JSON</button>
        <button class="tab" data-tab="construction" data-i18n="replacer.tab">Remplazador</button>
      </div>
      
      <div class="tab-content active" id="editor">
        <div id="header">
          <span id="file-name" data-i18n="file.noLoaded">No file loaded</span>
          <div class="header-buttons">
            <button id="open-btn" data-i18n="file.open">Open</button>
            <button id="save-btn" data-i18n="file.save" disabled>Save</button>
          </div>
        </div>
        <div id="json-container">
          <div id="json-display" data-i18n="editor.placeholder">Load a JSON file using File > Open JSON or Ctrl+O</div>
        </div>
      </div>
      
      <div class="tab-content" id="construction">
        <div class="replacer-container">
          <h2 data-i18n="replacer.title">Reemplazar Valores JSON</h2>
          
          <div class="replacer-section">
            <label data-i18n="replacer.keysLabel">Claves a reemplazar:</label>
            <div class="manual-key-group">
              <input type="text" id="manual-key" data-i18n-placeholder="replacer.keyPlaceholder" placeholder="JSONPath ej: $.nombre, $.persona.edad">
              <input type="text" id="manual-value" data-i18n-placeholder="replacer.valuePlaceholder" placeholder="Valor">
              <button id="add-key-btn" class="btn-secondary" data-i18n="replacer.addKey">Agregar</button>
            </div>
            <div id="keys-list" class="preview-area"></div>
          </div>

          <div class="replacer-section">
            <label data-i18n="replacer.destLabel">Archivos Destino (múltiples):</label>
            <div class="file-input-group">
              <input type="text" id="dest-files-name" readonly data-i18n-placeholder="replacer.destPlaceholder" placeholder="Seleccione archivos destino...">
              <button id="load-dest-btn" class="btn-secondary" data-i18n="replacer.loadDest">Cargar Destinos</button>
            </div>
            <div id="dest-files-list" class="files-list"></div>
          </div>

          <div class="replacer-section">
            <button id="replace-btn" class="btn-primary" data-i18n="replacer.replace" disabled>Reemplazar</button>
            <div class="config-buttons">
              <button id="save-config-btn" class="btn-secondary" data-i18n="replacer.saveConfig">Guardar Config</button>
              <button id="load-config-btn" class="btn-secondary" data-i18n="replacer.loadConfig">Cargar Config</button>
            </div>
          </div>

          <div id="replace-result" class="result-area"></div>
        </div>
      </div>
    </div>
    <script src="./renderer/utils.js"></script>
    <script src="./renderer/editor.js"></script>
    <script src="./renderer/replacer.js"></script>
    <script src="./renderer/index.js"></script>
  </body>
</html>
